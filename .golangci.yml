run:
  allow-parallel-runners: true
  timeout: 3m
  tests: true
issues:
  exclude-dirs:
    - internal/adapters/dataproviders/rootstock/bindings
    - test/mocks
  exclude-rules:
    - linters:
        - staticcheck
      text: "SA1019: .*\\.(BridgeRefundTxHash|BridgeRefundGasUsed|BridgeRefundGasPrice) is deprecated: superseded by BridgeRebalances;"
linters:
  presets:
    - bugs
    - complexity
    - unused
    - performance
linters-settings:
  errcheck:
   check-type-assertions: true
   check-blank: true
  govet:
    enable:
      - nilness
      - defers
      - lostcancel
      - nilfunc
      - shadow
      - unusedwrite
  exhaustive:
    default-signifies-exhaustive: true
  gosec:
    excludes:
      - G115 # TODO update project to cast safely